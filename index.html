          id="themeToggle"
          aria-label="Toggle theme"
          title="Toggle dark/light mode"

          <div class="toggle-thumb">

                x2="12"

                y2="23"

                stroke-width="2"
              />
              <line

                stroke-width="2"

                x2="19.78"

                stroke="white"
                stroke-width="2"
              />

                x1="1"
                y1="12"
                x2="3"
                y2="12"
                stroke="white"
                stroke-width="2"
              />
              <line
                x1="21"
                y1="12"
                x2="23"
                y2="12"
                stroke="white"
                stroke-width="2"
              />
              <line
                x1="4.22"
                y1="19.78"
                x2="5.64"
                y2="18.36"
                stroke="white"
                stroke-width="2"
              />
              <line
                x1="18.36"
                y1="5.64"
                x2="19.78"
                y2="4.22"
                stroke="white"
                stroke-width="2"
              />
            </svg>
          </div>
        </button>
      </div>
    </nav>

    <!-- HERO -->
    <div class="hero">
      <img class="hero-image" src="Images/HeroImage.jpg" alt="Hero Banner" />
      <div class="hero-gradient"></div>
    </div>

    <!-- MAIN -->
    <main>
      <!-- Tabs -->
      <div class="tabs-wrapper">
        <div class="tabs">
          <button class="tab active" onclick="setTab(this)">Movies</button>
          <button class="tab" onclick="setTab(this)">Series</button>
        </div>
      </div>

      <!-- Search -->
      <div class="search-bar">
        <div class="search-input-wrap">
          <svg
            class="search-icon"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input
            class="search-input"
            type="text"
            placeholder="Search for movies or series…"
          />
        </div>
        <a href="search.html" class="search-btn-link">
          <button class="search-btn">Search</button>
        </a>
      </div>
